exclude: "docs|node_modules|migrations|.git|.tox"
default_stages: [pre-commit]
fail_fast: true

repos:
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args:
          - -i
        # .m here means MATLAB (e.g. examples/ross/groundingline.m), not
        # Objective-C; the project's .clang-format only declares C/C++,
        # so clang-format refuses to touch them.
        exclude: '\.m$'
        # Equivalent narrower filter, in case the exclude pattern grows
        # tricky later:
        #   types_or: [c, c++, c-header, c++-header]
      - id: clang-tidy
        args:
          - --fix-errors
        exclude: '\.m$'

